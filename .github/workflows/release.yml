name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.0.0)'
        required: true
        type: string

env:
  SCHEME: MarkdownReader
  PRODUCT_NAME: MarkdownReader
  BUNDLE_ID: com.markdownreader.app

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          # Strip leading 'v' for numeric version
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG (version: $VERSION)"

      - name: Validate CHANGELOG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [ ! -f CHANGELOG.md ]; then
            echo "❌ CHANGELOG.md not found!"
            exit 1
          fi
          if ! grep -q "\\[$VERSION\\]" CHANGELOG.md && ! grep -q "\\[${{ steps.version.outputs.tag }}\\]" CHANGELOG.md; then
            echo "❌ CHANGELOG.md does not contain version $VERSION or ${{ steps.version.outputs.tag }}"
            echo "Please update CHANGELOG.md before releasing."
            exit 1
          fi
          echo "✅ CHANGELOG.md validated for version $VERSION"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build
        run: swift build -c release

      - name: Assemble .app bundle
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_DIR="${{ env.PRODUCT_NAME }}.app"
          RESOURCES_DIR="$APP_DIR/Contents/Resources"
          MACOS_DIR="$APP_DIR/Contents/MacOS"

          # Create .app bundle structure
          mkdir -p "$MACOS_DIR"
          mkdir -p "$RESOURCES_DIR"

          # Copy executable
          cp ".build/release/${{ env.PRODUCT_NAME }}" "$MACOS_DIR/"

          # Generate Info.plist from template with version substitution
          sed "s/__VERSION__/$VERSION/g" scripts/Info.plist > "$APP_DIR/Contents/Info.plist"

          # Copy SPM-compiled resource bundle (includes Assets.xcassets)
          # SPM compiles resources into {TargetName}_{PackageName}.bundle during swift build
          RESOURCE_BUNDLE=".build/release/${{ env.PRODUCT_NAME }}_MarkdownReader.bundle"
          if [ -d "$RESOURCE_BUNDLE" ]; then
            cp -R "$RESOURCE_BUNDLE/" "$RESOURCES_DIR/"
            echo "✅ Copied SPM resource bundle"
          fi

          # Always compile Assets.xcassets with actool to produce Assets.car
          # macOS needs the compiled Assets.car (not raw PNGs) to display app icon
          # SPM bundle only contains raw PNGs, not the compiled asset catalog
          echo "📦 Compiling Assets.xcassets with actool..."
          actool \
            --compile "$RESOURCES_DIR" \
            --platform macosx \
            --minimum-deployment-target 15.0 \
            --app-icon AppIcon \
            --output-format human-readable-text \
            --output-partial-info-plist /tmp/partial.plist \
            "Sources/${{ env.PRODUCT_NAME }}/Assets.xcassets"

          # Create PkgInfo
          echo -n "APPL????" > "$APP_DIR/Contents/PkgInfo"

          echo "✅ .app bundle assembled at $APP_DIR"

      - name: Code sign .app
        run: |
          # Ad-hoc sign the app so macOS shows "unidentified developer" instead of "damaged"
          # Users can bypass via System Settings > Privacy & Security
          # For proper distribution, use Developer ID + notarization (requires Apple Developer account)
          echo "🔏 Ad-hoc signing ${{ env.PRODUCT_NAME }}.app..."
          codesign --force --deep --sign - "${{ env.PRODUCT_NAME }}.app"
          echo "✅ App signed (ad-hoc)"

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_NAME="${{ env.PRODUCT_NAME }}-$VERSION.dmg"
          rm -f "$DMG_NAME"

          create-dmg \
            --volname "${{ env.PRODUCT_NAME }} $VERSION" \
            --volicon "${{ env.PRODUCT_NAME }}.app/Contents/Resources/AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "${{ env.PRODUCT_NAME }}.app" 175 190 \
            --app-drop-link 425 190 \
            "$DMG_NAME" \
            "${{ env.PRODUCT_NAME }}.app"

          VOLICON="${{ env.PRODUCT_NAME }}.app/Contents/Resources/AppIcon.icns"
          if [ -f "$VOLICON" ]; then
            swiftc scripts/seticon.swift -o /tmp/seticon
            /tmp/seticon "$VOLICON" "$DMG_NAME"
          fi

          echo "✅ DMG created: $DMG_NAME"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          DMG_NAME="${{ env.PRODUCT_NAME }}-$VERSION.dmg"

          # Build release notes with install instructions
          cat > /tmp/release-body.md << 'BODY'
          ## 安装说明

          1. 下载 `.dmg` 文件，双击打开
          2. 将 **Markdown Reader** 拖入 **Applications** 文件夹
          3. 首次打开时，macOS 可能提示「无法验证开发者」：
             - 打开 **系统设置 > 隐私与安全性**
             - 找到被阻止的 app，点击 **仍要打开**
             - 或在终端运行：`xattr -cr /Applications/MarkdownReader.app`
          4. 也可以直接右键点击 app → 选择 **打开**

          ---

          BODY

          # Append changelog if available
          if [ -f "release-notes-${TAG}.md" ]; then
            cat "release-notes-${TAG}.md" >> /tmp/release-body.md
          elif [ -f "CHANGELOG.md" ]; then
            awk "/^## \\[.*${VERSION}.*\\]/,/^## \\[/" CHANGELOG.md | sed '$d' >> /tmp/release-body.md
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-body.md \
            "$DMG_NAME"

          echo "✅ GitHub Release $TAG created with $DMG_NAME"
