# MarkdownReader 项目主页 Jekyll 配置

title: Markdown Reader
description: 不是又一个全能编辑器，只是一个安静的阅读器
tagline: 安静的 Markdown 阅读器
url: "https://davidhoo.github.io"
baseurl: "/MarkdownReader"
lang: zh-CN

# 多语言支持
languages:
  - code: zh-CN
    name: 简体中文
  - code: zh-TW
    name: 繁體中文
  - code: en
    name: English
  - code: ja
    name: 日本語
default_lang: zh-CN

# MarkdownReader 应用信息
app:
  name: Markdown Reader
  version: "2.0.0"
  macos_version: "26"
  download_url: "https://github.com/davidhoo/MarkdownReader/releases/latest"
  repo_url: "https://github.com/davidhoo/MarkdownReader"
  license: MIT

# 构建设置
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# 排除不需要的文件
exclude:
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - README.md
  - vendor/

# 插件（GitHub Pages 支持的）
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# 默认值
defaults:
  - scope:
      path: ""
    values:
      layout: default
