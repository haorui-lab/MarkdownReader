<section class="themes-section" id="themes">
  <h2 class="section-title">{{ include.t.themes_title }}</h2>
  <p class="section-subtitle">{{ include.t.themes_subtitle }}</p>

  <div class="theme-filter">
    <button class="theme-filter-btn active" data-filter="all">{{ include.t.themes_filter_all }}</button>
    <button class="theme-filter-btn" data-filter="dark">{{ include.t.themes_filter_dark }}</button>
    <button class="theme-filter-btn" data-filter="light">{{ include.t.themes_filter_light }}</button>
  </div>

  <div class="themes-grid" id="themes-grid">
    {% for theme in site.data.themes %}
    <div class="theme-card" data-type="{{ theme.type }}" data-id="{{ theme.id }}">
      <div class="theme-preview" style="background-color: {{ theme.surface }}; color: {{ theme.ink }};">
        <div class="theme-preview-header">
          <span class="theme-preview-dot" style="background: {{ theme.danger }};"></span>
          <span class="theme-preview-dot" style="background: {{ theme.success }};"></span>
          <span class="theme-preview-dot" style="background: {{ theme.accent }};"></span>
        </div>
        <div class="theme-preview-body">
          <span class="theme-preview-title" style="color: {{ theme.ink }};">{{ theme.name }}</span>
          <div class="theme-preview-line" style="background: {{ theme.ink }}; opacity: 0.3;"></div>
          <div class="theme-preview-line short" style="background: {{ theme.ink }}; opacity: 0.2;"></div>
          <div class="theme-preview-line" style="background: {{ theme.accent }}; opacity: 0.4;"></div>
          <div class="theme-preview-line short" style="background: {{ theme.ink }}; opacity: 0.15;"></div>
        </div>
      </div>
      <div class="theme-colors">
        <div class="theme-color-swatch" style="background: {{ theme.surface }};" title="Surface: {{ theme.surface }}"></div>
        <div class="theme-color-swatch" style="background: {{ theme.ink }};" title="Ink: {{ theme.ink }}"></div>
        <div class="theme-color-swatch" style="background: {{ theme.accent }};" title="Accent: {{ theme.accent }}"></div>
        <div class="theme-color-swatch" style="background: {{ theme.success }};" title="Success: {{ theme.success }}"></div>
        <div class="theme-color-swatch" style="background: {{ theme.danger }};" title="Danger: {{ theme.danger }}"></div>
      </div>
      <span class="theme-name">{{ theme.name }}</span>
      <span class="theme-type-badge {{ theme.type }}">{{ theme.type }}</span>
    </div>
    {% endfor %}
  </div>
</section>
