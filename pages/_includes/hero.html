<section class="hero">
  <div class="hero-content">
    <div class="hero-text">
      <div class="hero-brand">
        <img class="hero-icon" src="{{ site.baseurl }}/assets/img/icon.png" alt="Markdown Reader" width="72" height="72">
        <h1 class="hero-title">Markdown Reader</h1>
      </div>
      <p class="hero-tagline">不是又一个全能编辑器，只是一个安静的阅读器</p>
      <div class="hero-actions">
        <a class="hero-download-btn" href="{{ site.app.download_url }}">免费下载</a>
        <span class="hero-badge">macOS {{ site.app.macos_version }}+</span>
      </div>
    </div>
    <div class="hero-window">
      <div class="macos-window">
        <div class="macos-titlebar">
          <div class="traffic-lights">
            <span class="dot dot-red"></span>
            <span class="dot dot-yellow"></span>
            <span class="dot dot-green"></span>
          </div>
          <span class="macos-titlebar-text">Markdown Reader</span>
        </div>
        <div class="macos-body">
          <img class="hero-screenshot" src="{{ site.baseurl }}/assets/img/hero-screenshot.png" alt="Markdown Reader 截图">
        </div>
      </div>
    </div>
  </div>
</section>
