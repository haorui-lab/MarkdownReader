<footer class="footer">
  <div class="footer-content">
    <div class="footer-brand">
      <img class="footer-icon" src="{{ site.baseurl }}/assets/img/icon.png" alt="Markdown Reader" width="24" height="24">
      <span>Markdown Reader</span>
    </div>
    <div class="footer-links">
      <a href="{{ site.app.repo_url }}">GitHub</a>
      <a href="{{ site.app.repo_url }}/releases">Releases</a>
      <a href="{{ site.app.repo_url }}/blob/main/CHANGELOG.md">Changelog</a>
      <a href="{{ site.baseurl }}/{% if page.lang and page.lang != 'zh-CN' %}{{ page.lang }}/{% endif %}help.html">{{ include.t.footer_help }}</a>
    </div>
    <div class="footer-copy">
      &copy; {{ 'now' | date: '%Y' }} Markdown Reader. {{ site.app.license }} License.
    </div>
  </div>
</footer>
