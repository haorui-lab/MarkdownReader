# Features
features_title: "なぜこのアプリ？"
features_subtitle: "Markdownツールは増え続けていますが、あなたはただ静かに文書を読みたいだけ"
feature_instant_title: "瞬間起動"
feature_instant_desc: "ネイティブ macOS アプリ。高速起動、高速切り替え、スムーズな読書。スプラッシュスクリーンもロード待ちもありません。"
feature_focus_title: "読書に集中"
feature_focus_desc: "3ペインレイアウト — ファイルツリー + レンダリングビュー + アウトラインナビゲーション。文書構造を一目で把握。"
feature_quicklook_title: "Quick Look プレビュー"
feature_quicklook_desc: "Finder で .md ファイルを選択してスペースキーを押すとプレビュー。アプリ起動不要。"
feature_mermaid_title: "Mermaid & PlantUML"
feature_mermaid_desc: "フローチャート、シーケンス図、ガントチャート等をローカルレンダリング。PlantUML 構文は自動的に SVG としてレンダリング。"
feature_math_title: "数式"
feature_math_desc: "KaTeX で LaTeX インライン・ブロック数式をレンダリング。技術文書の数式が完璧に表示されます。"
feature_cli_title: "CLI ツール mdr"
feature_cli_desc: "ターミナルで `mdr README.md` と入力するだけでファイルを開けます。開発者のワークフローにシームレスに統合。"
feature_themes_title: "33 テーマ"
feature_themes_desc: "20 ダーク + 13 ライト — Dracula、Catppuccin、Nord、Tokyo Night… Markdown Preview Enhanced スタイルテーマ含む。"
feature_lightweight_title: "超軽量"
feature_lightweight_desc: "DMG インストーラは10MB未満。登録不要、ログイン不要、複雑な設定なし。開くだけ。"
feature_drag_title: "ドラッグ＆ドロップ"
feature_drag_desc: ".md ファイルやフォルダをウィンドウに直接ドラッグして、すぐに読み始められます。"
feature_pdf_title: "PDF 書き出し"
feature_pdf_desc: "レンダリング済み Markdown をワンクリックで PDF に書き出し。テーマスタイルを保持し、共有とアーカイブに便利。"

