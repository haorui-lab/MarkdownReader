help_quickstart_title: "クイックスタート"
help_quickstart_subtitle: "ファイルを開いて、読み始める — それだけ"
help_qs_open_title: "1. ファイルまたはフォルダを開く"
help_qs_open_desc: "⌘O を押すかツールバーの開くボタンをクリックして、.md ファイルまたはフォルダを選択。ファイルやフォルダをウィンドウに直接ドラッグ＆ドロップすることもできます。"
help_qs_read_title: "2. 読む・ナビゲート"
help_qs_read_desc: "左側のファイルツリーでディレクトリ構造を閲覧し、右側のレンダリングビューで内容を読む。アウトラインボタンまたは ⌘\\ でサイドバーを切替。"
help_qs_edit_title: "3. 編集・保存"
help_qs_edit_desc: "ソースモード（⇧⌘R）に切り替えて直接編集、⌘S で保存。ファイル切り替え時に未保存内容は自動保持されます。"

