help_features_title: "機能詳細"
help_features_subtitle: "すべての機能が読書体験のために設計されています"
feat_render_title: "レンダリングビュー"
feat_render_desc: "cmark-gfm エンジンが Markdown を解析し、WKWebView がリッチテキストとしてレンダリング。テーブル、タスクリスト、取り消し線、自動リンクなど完全な GFM 拡張をサポート。"
feat_edit_title: "ソース編集"
feat_edit_desc: "⇧⌘R で Markdown ソースを直接編集。Prism.js による30+言語のシンタックスハイライト。⌘S で保存、ファイル切り替え時に未保存内容を自動保持。"
feat_filetree_title: "ファイルツリー"
feat_filetree_desc: "フォルダを再帰的に閲覧、キーボードナビゲーション（矢印キーで選択、Enter で開く）。右クリックメニューで作成、名前変更、移動、削除。"
feat_outline_title: "アウトラインナビゲーション"
feat_outline_desc: "見出し階層を自動抽出、クリックでクイックジャンプ。長文書の効率的な閲覧に。"
feat_find_title: "検索と置換"
feat_find_desc: "⌘F で検索バーを開く。大文字小文字区別、単語全体一致、正規表現をサポート。⌥⌘F で検索と置換。"
feat_zoom_title: "ビューズーム"
feat_zoom_desc: "⌘+ / ⌘- でコンテンツをズーム、範囲 0.3x–3.0x。⌘0 で実際のサイズに復元。ズームレベルは自動保持。"

help_themes_title: "テーマと外観"
help_themes_subtitle: "33 テーマであなたの読書空間を作る"
feat_mode_title: "テーマモード"
feat_mode_desc: "設定 → 外観で、ライト、ダーク、システムに従うの3つのモードから選択。アプリの外観が即座に切り替わります。"
feat_palette_title: "カラースキーム"
feat_palette_desc: "33 のプリセットカラースキーム（20 ダーク + 13 ライト）— Dracula、Catppuccin、Nord、Tokyo Night… 各モードに独立したカラー設定。"
feat_custom_title: "カスタムカラー"
feat_custom_desc: "設定 → 外観 → カスタムカラーで、背景色、文字色、アクセント色、成功色、危険色を個別に調整。"
feat_contrast_title: "コントラスト調整"
feat_contrast_desc: "低/高の2段階のコントラストオプションで、背景と前景の視覚的コントラストを調整。"

help_diagrams_title: "図表と数式"
help_diagrams_subtitle: "技術文書の完璧なレンダリング"
feat_mermaid_help_title: "Mermaid 図表"
feat_mermaid_help_desc: "コードブロックで `mermaid` 言語識別子を使用すると、フローチャート、シーケンス図、ガントチャート等をレンダリング。ローカルレンダリング、ネットワーク不要。"
feat_katex_title: "数式 (KaTeX)"
feat_katex_desc: "インライン数式は `$...$`、ブロック数式は `$$...$$` で囲みます。LaTeX 構文が完璧に表示されます。"
feat_plantuml_help_title: "PlantUML 図表"
feat_plantuml_help_desc: "コードブロックで `plantuml` 言語識別子を使用すると、SVG 図表として自動レンダリング。ネットワーク接続が必要です。"

help_cli_title: "CLI ツール mdr"
help_cli_subtitle: "シームレスなターミナルワークフロー"
feat_cli_install_title: "インストール"
feat_cli_install_desc: "設定 → 一般 → CLI ツール を開き、インストールボタンをクリック。インストール後、`mdr` コマンドがターミナルで使用可能になります。"
feat_cli_use_title: "使い方"
feat_cli_use_desc: "ターミナルで `mdr README.md` と入力してファイルを開けます。複数のファイルとフォルダの同時オープンに対応。"

help_more_title: "その他の機能"
help_more_subtitle: "まだまだ便利な機能があります"
feat_ql_title: "Quick Look プレビュー"
feat_ql_desc: "Finder で .md ファイルを選択してスペースキーを押すとプレビュー。設定 → 一般 → Quick Look プレビュー で有効化してください。"
feat_export_title: "PDF 書き出し"
feat_export_desc: "⌥⌘E または ファイル → PDF 書き出し メニューで、レンダリング内容を PDF ファイルとして書き出し。現在のテーマスタイルを保持。"

help_faq_title: "よくある質問"
help_faq_subtitle: "問題がありますか？まずここを確認"
faq_formats_q: "どのファイル形式に対応していますか？"
faq_formats_a: "`.md`、`.markdown`、`.mdown`、`.mkd` などの Markdown 形式ファイルに対応しています。"
faq_system_q: "動作環境は？"
faq_system_a: "macOS 26 (Tahoe) 以降。"
faq_plantuml_q: "PlantUML 図表がレンダリングされない？"
faq_plantuml_a: "PlantUML レンダリングにはネットワーク接続が必要です。PlantUML サーバーにアクセスできることを確認してください。オフライン環境でも Mermaid 図表はローカルレンダリングで使用可能です。"
faq_default_q: "Markdown Reader をデフォルトアプリに設定するには？"
faq_default_a: "設定 → 一般 → デフォルト Markdown アプリ を開き、「デフォルトに設定」をクリック。または .md ファイルを右クリック → 情報を見る → このアプリケーションで開く → Markdown Reader を選択 → 「すべてを変更」をクリック。"
faq_feedback_q: "問題や提案を報告するには？"
faq_feedback_a: "GitHub Issues でフィードバックをお寄せください。"

