# Features
features_title: "為什麼選它？"
features_subtitle: "市面上 Markdown 工具越來越多，但你只是想安靜地讀完一個文件"
feature_instant_title: "秒開秒讀"
feature_instant_desc: "原生 macOS 應用程式，啟動快、切換快、閱讀流暢。沒有啟動畫面，沒有載入等待。"
feature_focus_title: "專注閱讀"
feature_focus_desc: "三欄佈局——目錄樹 + 渲染檢視 + 大綱導航，一眼看清文件結構，長文件也不迷路。"
feature_quicklook_title: "Quick Look 預覽"
feature_quicklook_desc: "Finder 中選取 .md 檔案按空白鍵，即可預覽渲染效果——無需開啟應用程式，快速瀏覽文件。"
feature_mermaid_title: "Mermaid & PlantUML"
feature_mermaid_desc: "流程圖、時序圖、甘特圖等 Mermaid 圖表本機渲染；PlantUML 語法自動渲染為 SVG。"
feature_math_title: "數學公式"
feature_math_desc: "KaTeX 渲染 LaTeX 行內和區塊公式，技術文件中的數學運算式完美呈現。"
feature_cli_title: "命令列工具 mdr"
feature_cli_desc: "終端機輸入 `mdr README.md` 即可開啟檔案，開發者工作流程無縫銜接。"
feature_themes_title: "33 套主題"
feature_themes_desc: "20 深色 + 13 淺色，Dracula、Catppuccin、Nord、Tokyo Night……含 Markdown Preview Enhanced 風格主題，總有一款適合你。"
feature_lightweight_title: "極小極輕"
feature_lightweight_desc: "DMG 安裝包不到 10MB。不註冊、不登入、沒有複雜設定，開啟即用。"
feature_drag_title: "拖拽開啟"
feature_drag_desc: "將 .md 檔案或資料夾直接拖入視窗，即刻開始閱讀，無需選單操作。"
feature_pdf_title: "匯出 PDF"
feature_pdf_desc: "一鍵將渲染後的 Markdown 匯出為 PDF，保留主題樣式，方便分享和歸檔。"
feature_command_palette_title: "命令面板"
feature_command_palette_desc: "按 ⌘P 快速搜尋並開啟檔案，模糊比對檔案名稱，鍵盤導航。"

