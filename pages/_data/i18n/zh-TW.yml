help_features_title: "功能詳解"
help_features_subtitle: "每個功能都為閱讀體驗而生"
feat_render_title: "渲染檢視"
feat_render_desc: "cmark-gfm 引擎解析 Markdown，WKWebView 渲染為富文字。支援完整 GFM 擴展語法，包括表格、任務清單、刪除線、自動連結等。"
feat_edit_title: "原文編輯"
feat_edit_desc: "按 ⇧⌘R 直接編輯 Markdown 原始碼，Prism.js 語法高亮支援 30+ 語言。⌘S 儲存，切換檔案自動保留未儲存內容。"
feat_filetree_title: "檔案樹"
feat_filetree_desc: "遞迴瀏覽資料夾，鍵盤導航（方向鍵選擇，Enter 開啟）。右鍵選單提供新增、重新命名、移動、刪除等操作。"
feat_outline_title: "大綱導航"
feat_outline_desc: "自動提取標題層級結構，點擊快速跳轉，閱讀長文件更高效。"
feat_find_title: "尋找與取代"
feat_find_desc: "按 ⌘F 開啟尋找列。支援區分大小寫、全詞匹配、正規表示式。⌥⌘F 開啟尋找與取代。"
feat_zoom_title: "檢視縮放"
feat_zoom_desc: "使用 ⌘+ / ⌘- 縮放內容，範圍 0.3x–3.0x。按 ⌘0 恢復實際大小，縮放級別自動恢復。"
feat_command_palette_title: "命令面板"
feat_command_palette_desc: "按 ⌘P 開啟命令面板，輸入檔案名稱快速搜尋並開啟目錄樹中的 Markdown 檔案。支援模糊比對和鍵盤導航（↑↓ 選擇，Enter 開啟）。"

help_themes_title: "主題與外觀"
help_themes_subtitle: "33 套主題，打造你的閱讀空間"
feat_mode_title: "主題模式"
feat_mode_desc: "在設定 → 外觀中，可選擇淺色、深色或跟隨系統三種模式，應用程式立即切換外觀。"
feat_palette_title: "配色方案"
feat_palette_desc: "33 套預設配色（20 深色 + 13 淺色），Dracula、Catppuccin、Nord、Tokyo Night……每種模式有獨立配色。"
feat_custom_title: "自訂顏色"
feat_custom_desc: "在設定 → 外觀 → 自訂顏色中，可單獨調整背景色、文字色、強調色、成功色、危險色。"
feat_contrast_title: "對比度調節"
feat_contrast_desc: "提供低/高兩檔對比度選項，調整背景與前景層之間的視覺對比。"

help_diagrams_title: "圖表與公式"
help_diagrams_subtitle: "技術文件的完美渲染"
feat_mermaid_help_title: "Mermaid 圖表"
feat_mermaid_help_desc: "在程式碼區塊中使用 `mermaid` 語言標識，即可渲染流程圖、時序圖、甘特圖等。本機渲染，無需網路。"
feat_katex_title: "數學公式 (KaTeX)"
feat_katex_desc: "使用 `$...$` 包裹行內公式，`$$...$$` 包裹區塊公式。LaTeX 語法完美呈現。"
feat_plantuml_help_title: "PlantUML 圖表"
feat_plantuml_help_desc: "在程式碼區塊中使用 `plantuml` 語言標識，自動渲染為 SVG 圖表。需要網路連線。"

help_cli_title: "命令列工具 mdr"
help_cli_subtitle: "終端機工作流程無縫銜接"
feat_cli_install_title: "安裝"
feat_cli_install_desc: "開啟 設定 → 一般 → 命令列工具，點擊「安裝」按鈕。安裝完成後，`mdr` 命令即可在終端機中使用。"
feat_cli_use_title: "使用"
feat_cli_use_desc: "終端機輸入 `mdr README.md` 即可開啟檔案，支援同時開啟多個檔案和資料夾。"

help_more_title: "更多功能"
help_more_subtitle: "還有這些貼心功能等你發現"
feat_ql_title: "Quick Look 預覽"
feat_ql_desc: "在 Finder 中選取 .md 檔案按空白鍵，即可預覽渲染效果。需在 設定 → 一般 → Quick Look 預覽 中啟用。"
feat_export_title: "匯出 PDF"
feat_export_desc: "按 ⌥⌘E 或使用選單 檔案 → 匯出 PDF，將渲染內容匯出為 PDF 檔案，保留目前主題樣式。"

help_faq_title: "常見問題"
help_faq_subtitle: "遇到問題？先看看這裡"
faq_formats_q: "支援哪些檔案格式？"
faq_formats_a: "支援 `.md`、`.markdown`、`.mdown`、`.mkd` 等 Markdown 格式檔案。"
faq_system_q: "系統需求是什麼？"
faq_system_a: "macOS 26 (Tahoe) 或更高版本。"
faq_plantuml_q: "PlantUML 圖表無法渲染？"
faq_plantuml_a: "PlantUML 渲染需要網路連線，請確保可以存取 PlantUML 伺服器。如果處於離線環境，Mermaid 圖表仍可正常使用（本機渲染）。"
faq_default_q: "如何設定 Markdown Reader 為預設開啟程式？"
faq_default_a: "開啟 設定 → 一般 → 預設 Markdown 開啟程式，點擊「設為預設」即可。也可以右鍵 .md 檔案 → 顯示簡介 → 開啟方式 → 選擇 Markdown Reader → 點擊「全部更改」。"
faq_feedback_q: "如何回饋問題或建議？"
faq_feedback_a: "歡迎在 GitHub Issues 中提交回饋。"

