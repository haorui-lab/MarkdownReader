help_features_title: "功能详解"
help_features_subtitle: "每个功能都为阅读体验而生"
feat_render_title: "渲染视图"
feat_render_desc: "cmark-gfm 引擎解析 Markdown，WKWebView 渲染为富文本。支持完整 GFM 扩展语法，包括表格、任务列表、删除线、自动链接等。"
feat_edit_title: "原文编辑"
feat_edit_desc: "按 ⇧⌘R 直接编辑 Markdown 源码，Prism.js 语法高亮支持 30+ 语言。⌘S 保存，切换文件自动保留未保存内容。"
feat_filetree_title: "文件树"
feat_filetree_desc: "递归浏览文件夹，键盘导航（方向键选择，回车打开）。右键菜单提供新建、重命名、移动、删除等操作。"
feat_outline_title: "大纲导航"
feat_outline_desc: "自动提取标题层级结构，点击快速跳转，阅读长文档更高效。"
feat_find_title: "查找与替换"
feat_find_desc: "按 ⌘F 打开查找栏。支持区分大小写、全词匹配、正则表达式。⌥⌘F 打开查找与替换。"
feat_zoom_title: "视图缩放"
feat_zoom_desc: "使用 ⌘+ / ⌘- 缩放内容，范围 0.3x–3.0x。按 ⌘0 恢复实际大小，缩放级别自动恢复。"

help_themes_title: "主题与外观"
help_themes_subtitle: "33 套主题，打造你的阅读空间"
feat_mode_title: "主题模式"
feat_mode_desc: "在设置 → 外观中，可选择浅色、深色或跟随系统三种模式，应用立即切换外观。"
feat_palette_title: "配色方案"
feat_palette_desc: "33 套预设配色（20 深色 + 13 浅色），Dracula、Catppuccin、Nord、Tokyo Night……每种模式有独立配色。"
feat_custom_title: "自定义颜色"
feat_custom_desc: "在设置 → 外观 → 自定义颜色中，可单独调整背景色、文字色、强调色、成功色、危险色。"
feat_contrast_title: "对比度调节"
feat_contrast_desc: "提供低/高两档对比度选项，调整背景与前景层之间的视觉对比。"

help_diagrams_title: "图表与公式"
help_diagrams_subtitle: "技术文档的完美渲染"
feat_mermaid_help_title: "Mermaid 图表"
feat_mermaid_help_desc: "在代码块中使用 `mermaid` 语言标识，即可渲染流程图、时序图、甘特图等。本地渲染，无需网络。"
feat_katex_title: "数学公式 (KaTeX)"
feat_katex_desc: "使用 `$...$` 包裹行内公式，`$$...$$` 包裹块级公式。LaTeX 语法完美呈现。"
feat_plantuml_help_title: "PlantUML 图表"
feat_plantuml_help_desc: "在代码块中使用 `plantuml` 语言标识，自动渲染为 SVG 图表。需要网络连接。"

help_cli_title: "命令行工具 mdr"
help_cli_subtitle: "终端工作流无缝衔接"
feat_cli_install_title: "安装"
feat_cli_install_desc: "打开 设置 → 通用 → 命令行工具，点击「安装」按钮。安装完成后，`mdr` 命令即可在终端中使用。"
feat_cli_use_title: "使用"
feat_cli_use_desc: "终端输入 `mdr README.md` 即可打开文件，支持同时打开多个文件和文件夹。"

help_more_title: "更多功能"
help_more_subtitle: "还有这些贴心功能等你发现"
feat_ql_title: "Quick Look 预览"
feat_ql_desc: "在 Finder 中选中 .md 文件按空格，即可预览渲染效果。需在 设置 → 通用 → Quick Look 预览 中启用。"
feat_export_title: "导出 PDF"
feat_export_desc: "按 ⌥⌘E 或使用菜单 文件 → 导出 PDF，将渲染内容导出为 PDF 文件，保留当前主题样式。"

help_faq_title: "常见问题"
help_faq_subtitle: "遇到问题？先看看这里"
faq_formats_q: "支持哪些文件格式？"
faq_formats_a: "支持 `.md`、`.markdown`、`.mdown`、`.mkd` 等 Markdown 格式文件。"
faq_system_q: "系统要求是什么？"
faq_system_a: "macOS 26 (Tahoe) 或更高版本。"
faq_plantuml_q: "PlantUML 图表无法渲染？"
faq_plantuml_a: "PlantUML 渲染需要网络连接，请确保可以访问 PlantUML 服务器。如果处于离线环境，Mermaid 图表仍可正常使用（本地渲染）。"
faq_default_q: "如何设置 Markdown Reader 为默认打开程序？"
faq_default_a: "打开 设置 → 通用 → 默认 Markdown 打开程序，点击「设为默认」即可。也可以右键 .md 文件 → 显示简介 → 打开方式 → 选择 Markdown Reader → 点击「全部更改」。"
faq_feedback_q: "如何反馈问题或建议？"
faq_feedback_a: "欢迎在 GitHub Issues 中提交反馈。"

