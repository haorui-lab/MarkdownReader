# Features
features_title: "为什么选它？"
features_subtitle: "市面上 Markdown 工具越来越多，但你只是想安静地读完一个文档"
feature_instant_title: "秒开秒读"
feature_instant_desc: "原生 macOS 应用，启动快、切换快、阅读流畅。没有启动画面，没有加载等待。"
feature_focus_title: "专注阅读"
feature_focus_desc: "三栏布局——目录树 + 渲染视图 + 大纲导航，一眼看清文档结构，长文档也不迷路。"
feature_quicklook_title: "Quick Look 预览"
feature_quicklook_desc: "Finder 中选中 .md 文件按空格，即可预览渲染效果——无需打开应用，快速浏览文档。"
feature_mermaid_title: "Mermaid & PlantUML"
feature_mermaid_desc: "流程图、时序图、甘特图等 Mermaid 图表本地渲染；PlantUML 语法自动渲染为 SVG。"
feature_math_title: "数学公式"
feature_math_desc: "KaTeX 渲染 LaTeX 行内和块级公式，技术文档中的数学表达式完美呈现。"
feature_cli_title: "命令行工具 mdr"
feature_cli_desc: "终端输入 `mdr README.md` 即可打开文件，开发者工作流无缝衔接。"
feature_themes_title: "33 套主题"
feature_themes_desc: "20 深色 + 13 浅色，Dracula、Catppuccin、Nord、Tokyo Night……含 Markdown Preview Enhanced 风格主题，总有一款适合你。"
feature_lightweight_title: "极小极轻"
feature_lightweight_desc: "DMG 安装包不到 10MB。不注册、不登录、没有复杂配置，打开即用。"
feature_drag_title: "拖拽打开"
feature_drag_desc: "将 .md 文件或文件夹直接拖入窗口，即刻开始阅读，无需菜单操作。"
feature_pdf_title: "导出 PDF"
feature_pdf_desc: "一键将渲染后的 Markdown 导出为 PDF，保留主题样式，方便分享和存档。"

