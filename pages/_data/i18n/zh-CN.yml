help_quickstart_title: "快速入门"
help_quickstart_subtitle: "打开文件，开始阅读，就这么简单"
help_qs_open_title: "1. 打开文件或文件夹"
help_qs_open_desc: "按 ⌘O 或点击工具栏打开按钮，选择 .md 文件或文件夹。也可以直接将文件或文件夹拖拽到窗口中。"
help_qs_read_title: "2. 阅读和导航"
help_qs_read_desc: "左侧文件树浏览目录结构，右侧渲染视图阅读内容。点击工具栏大纲按钮或按 ⌘\\ 切换侧边栏。"
help_qs_edit_title: "3. 编辑与保存"
help_qs_edit_desc: "切换到原文模式（⇧⌘R）直接编辑，按 ⌘S 保存。切换文件时未保存内容会自动保留。"

