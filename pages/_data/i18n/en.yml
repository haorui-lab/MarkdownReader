# Features
features_title: "Why This One?"
features_subtitle: "There are more Markdown tools than ever, but you just want to quietly read a document"
feature_instant_title: "Instant Launch"
feature_instant_desc: "Native macOS app. Fast startup, fast switching, smooth reading. No splash screen, no loading wait."
feature_focus_title: "Focused Reading"
feature_focus_desc: "Three-pane layout — file tree + rendered view + outline navigation. See document structure at a glance."
feature_quicklook_title: "Quick Look Preview"
feature_quicklook_desc: "Select a .md file in Finder and press Space to preview rendered content — no app launch needed."
feature_mermaid_title: "Mermaid & PlantUML"
feature_mermaid_desc: "Flowcharts, sequence diagrams, Gantt charts rendered locally via Mermaid; PlantUML auto-renders as SVG."
feature_math_title: "Math Formulas"
feature_math_desc: "KaTeX renders LaTeX inline and block formulas. Math expressions in technical docs look perfect."
feature_cli_title: "CLI Tool mdr"
feature_cli_desc: "Type `mdr README.md` in the terminal to open files. Seamless developer workflow."
feature_themes_title: "33 Themes"
feature_themes_desc: "20 dark + 13 light — Dracula, Catppuccin, Nord, Tokyo Night… Including Markdown Preview Enhanced style themes."
feature_lightweight_title: "Tiny & Lightweight"
feature_lightweight_desc: "DMG installer under 10MB. No sign-up, no login, no complex configuration. Just open and read."
feature_drag_title: "Drag & Drop"
feature_drag_desc: "Drag .md files or folders directly into the window to start reading instantly."
feature_pdf_title: "Export PDF"
feature_pdf_desc: "One-click export rendered Markdown to PDF, preserving theme styles for easy sharing and archiving."

