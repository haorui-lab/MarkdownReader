help_quickstart_title: "Quick Start"
help_quickstart_subtitle: "Open a file, start reading — it's that simple"
help_qs_open_title: "1. Open a File or Folder"
help_qs_open_desc: "Press ⌘O or click the toolbar open button to select a .md file or folder. You can also drag and drop files or folders directly into the window."
help_qs_read_title: "2. Read & Navigate"
help_qs_read_desc: "Browse directory structure in the file tree on the left, read content in the rendered view on the right. Click the outline button or press ⌘\\ to toggle the sidebar."
help_qs_edit_title: "3. Edit & Save"
help_qs_edit_desc: "Switch to source mode (⇧⌘R) to edit directly, press ⌘S to save. Unsaved content is automatically preserved when switching files."

