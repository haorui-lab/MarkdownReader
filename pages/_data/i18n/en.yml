help_features_title: "Feature Details"
help_features_subtitle: "Every feature designed for the reading experience"
feat_render_title: "Rendered View"
feat_render_desc: "cmark-gfm engine parses Markdown, WKWebView renders as rich text. Full GFM extension support including tables, task lists, strikethrough, autolinks, and more."
feat_edit_title: "Source Editing"
feat_edit_desc: "Press ⇧⌘R to edit Markdown source directly with Prism.js syntax highlighting for 30+ languages. ⌘S to save, unsaved content auto-preserved when switching."
feat_filetree_title: "File Tree"
feat_filetree_desc: "Recursively browse folders with keyboard navigation (arrow keys to select, Enter to open). Right-click menu for create, rename, move, and delete."
feat_outline_title: "Outline Navigation"
feat_outline_desc: "Auto-extract heading hierarchy, click to jump quickly. More efficient for reading long documents."
feat_find_title: "Find & Replace"
feat_find_desc: "Press ⌘F to open find bar. Supports case-sensitive, whole-word, and regex matching. ⌥⌘F for find and replace."
feat_zoom_title: "View Zoom"
feat_zoom_desc: "Use ⌘+ / ⌘- to zoom content, range 0.3x–3.0x. Press ⌘0 to restore actual size. Zoom level auto-persists."

help_themes_title: "Themes & Appearance"
help_themes_subtitle: "33 themes to craft your reading space"
feat_mode_title: "Theme Mode"
feat_mode_desc: "In Settings → Appearance, choose Light, Dark, or Follow System mode. The app switches appearance instantly."
feat_palette_title: "Color Schemes"
feat_palette_desc: "33 preset color schemes (20 dark + 13 light) — Dracula, Catppuccin, Nord, Tokyo Night… Each mode has independent colors."
feat_custom_title: "Custom Colors"
feat_custom_desc: "In Settings → Appearance → Custom Colors, adjust background, text, accent, success, and danger colors individually."
feat_contrast_title: "Contrast Control"
feat_contrast_desc: "Low/High contrast options to adjust visual contrast between background and foreground layers."

help_diagrams_title: "Diagrams & Formulas"
help_diagrams_subtitle: "Perfect rendering for technical docs"
feat_mermaid_help_title: "Mermaid Diagrams"
feat_mermaid_help_desc: "Use `mermaid` language identifier in code blocks to render flowcharts, sequence diagrams, Gantt charts, and more. Local rendering, no network needed."
feat_katex_title: "Math Formulas (KaTeX)"
feat_katex_desc: "Wrap inline formulas with `$...$` and block formulas with `$$...$`. LaTeX syntax rendered perfectly."
feat_plantuml_help_title: "PlantUML Diagrams"
feat_plantuml_help_desc: "Use `plantuml` language identifier in code blocks to auto-render as SVG diagrams. Requires network connection."

help_cli_title: "CLI Tool mdr"
help_cli_subtitle: "Seamless terminal workflow"
feat_cli_install_title: "Install"
feat_cli_install_desc: "Open Settings → General → CLI Tool and click the Install button. Once installed, the `mdr` command is available in the terminal."
feat_cli_use_title: "Usage"
feat_cli_use_desc: "Type `mdr README.md` in the terminal to open files. Supports opening multiple files and folders simultaneously."

help_more_title: "More Features"
help_more_subtitle: "Discover these handy features"
feat_ql_title: "Quick Look Preview"
feat_ql_desc: "Select a .md file in Finder and press Space to preview rendered content. Enable in Settings → General → Quick Look Preview."
feat_export_title: "Export PDF"
feat_export_desc: "Press ⌥⌘E or use File → Export PDF to export rendered content as a PDF file, preserving the current theme style."

help_faq_title: "FAQ"
help_faq_subtitle: "Having issues? Check here first"
faq_formats_q: "What file formats are supported?"
faq_formats_a: "Supports `.md`, `.markdown`, `.mdown`, `.mkd` and other Markdown format files."
faq_system_q: "What are the system requirements?"
faq_system_a: "macOS 26 (Tahoe) or later."
faq_plantuml_q: "PlantUML diagrams not rendering?"
faq_plantuml_a: "PlantUML rendering requires a network connection. Make sure you can access the PlantUML server. Mermaid diagrams still work offline (local rendering)."
faq_default_q: "How to set Markdown Reader as the default app?"
faq_default_a: "Open Settings → General → Default Markdown App and click Set as Default. Or right-click a .md file → Get Info → Open With → select Markdown Reader → click Change All."
faq_feedback_q: "How to report issues or suggestions?"
faq_feedback_a: "Feel free to submit feedback on GitHub Issues."

