<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} — {{ site.description }}{% endif %}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="icon" href="{{ site.baseurl }}/assets/img/favicon.png">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
  {% seo %}
</head>
<body>
  {% if page.show_home_sections %}
  {% include hero.html %}
  {% include features.html %}
  {% include themes.html %}
  {% include download.html %}
  {% endif %}
  {{ content }}
  {% include footer.html %}
  <script src="{{ site.baseurl }}/assets/js/themes.js" defer></script>
</body>
</html>
